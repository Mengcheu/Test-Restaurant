<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norton Restaurant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
    <header>
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Foodie Delight Logo">
                <h1>Norton Restaurant</h1>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="active">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="#" id="cartLink">Cart <span class="cart-count">0</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

   
    <section class="menu-page">
        <div class="container">
            <div class="menu-header">
                <h1>OUR MENU</h1>
                
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">All Items</button>
                <button class="filter-btn" data-category="pizza">Pizza</button>
                <button class="filter-btn" data-category="burger">Burgers</button>
                <button class="filter-btn" data-category="sandwich">Sandwiches</button>
            </div>
            
            <div class="food-grid" id="menuFoods">
               
            </div>
        </div>
    </section>

   
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Your Cart</h2>
                <span class="close-btn" id="closeCart">&times;</span>
            </div>
            <div class="cart-body">
                <div id="cartItems">
                    <!-- Cart items will be loaded here -->
                    <p class="empty-cart-message">Your cart is empty</p>
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <h3>Total: $<span id="cartTotal">0.00</span></h3>
                    </div>
                    <button class="btn-primary checkout-btn" id="checkoutBtn">Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                
                <div class="footer-section">
                    <h3>Quick Links</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>Contact Us</h3>
                    <p><i class="fas fa-map-marker-alt"></i> Thailand love Oun oun kampuchea </p>
                    <p><i class="fas fa-phone"></i> 0964460663</p>
                    <p><i class="fas fa-envelope"></i> MengCheu47@gmail.com</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; Norton University</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
